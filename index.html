  <style>
    *{ box-sizing: border-box; }
    body{
      margin: 0;
      min-height: 100svh;
      display: grid;
      place-items: center;
      background: #ffffff; /* fundo branco puro */
      color: #111;
      padding: 24px 16px;
      font-family: Georgia, "Times New Roman", Times, serif;
    }

    .wrap{
      width: min(860px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

.photo{
  width: min(520px, 92vw);
  /* remova o aspect-ratio para não forçar o recorte */
  border-radius: 42px;
  overflow: hidden;
  background: #fff;
  clip-path: inset(0 round 42px);
  -webkit-mask-image: -webkit-radial-gradient(white, black);
}

.photo img{
  width: 100%;
  height: auto;      /* importante */
  object-fit: contain;
  display: block;
  border-radius: 42px;
}

    h1{
      margin: 0;
      font-size: clamp(34px, 4.2vw, 56px);
      font-weight: 500;
      letter-spacing: 0.2px;
      text-align: center;
    }

    /* Ícone WhatsApp clicável: sem sombra */
    .wa{
      margin-top: 6px;
      width: 100px;
      height: 100px;
      display: grid;
      place-items: center;
      text-decoration: none;
      border-radius: 16px;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    .wa img{
      width: 92px;
      height: 92px;
      display: block;
    }
    .wa:active img{ transform: translateY(1px); }

    .hint{
      margin-top: -6px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      font-size: 13px;
      opacity: 0.65;
      text-align: center;
      max-width: 520px;
      line-height: 1.35;
    }
  </style>
</head>

<body>
  <main class="wrap">
    <!-- (1) IMAGEM DO CONSULTÓRIO: coloque consultorio.jpg no repo -->
    <div class="photo" aria-label="Foto do consultório">
      <img src="consultorio.jpg" alt="Consultório" />
    </div>

    <h1>Sou a psicóloga <a href="https://psicolaila.com">Laila Barros</a>.<br>Como posso lhe ajudar?</h1>

    <!-- (2) ÍCONE DO WHATSAPP: coloque whatsapp.png no repo -->
    <a class="wa" id="waLink" href="#" aria-label="Abrir WhatsApp">
      <img src="whatsapp.png" alt="WhatsApp" />
    </a>

    <div class="hint">
      <!--Se não abrir automaticamente, toque novamente e escolha “Abrir no WhatsApp”. -->
      Clique no ícone para abrir o WhatsApp.
    </div>
  </main>
  <script>
  (function () {
    const phone = "5531991065666";
    const text  = "Olá, gostaria de mais informações sobre a consulta";
    const enc   = encodeURIComponent(text);

    // Mobile (app + fallback)
    const appUrl = "whatsapp://send?phone=" + phone + "&text=" + enc;
    const mobileWebUrl  = "https://wa.me/" + phone + "?text=" + enc;

    // Desktop (web direto) + fallback universal
    const desktopWebUrl = "https://web.whatsapp.com/send?phone=" + phone + "&text=" + enc;

    function isMobile() {
      return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    }

    const wa = document.getElementById("waLink");
    const desktopFallback = document.getElementById("desktopFallback");

    // Preenche o fallback do desktop (se existir no HTML)
    if (desktopFallback) {
      desktopFallback.href = mobileWebUrl; // universal
    }

    wa.addEventListener("click", function (e) {
      e.preventDefault();

      // ✅ DESKTOP: WhatsApp Web direto (sem tela intermediária "Open app")
      if (!isMobile()) {
        window.location.href = desktopWebUrl;
        return;
      }

      // ✅ MOBILE: mantém seu comportamento atual (abre app e não troca a aba para wa.me se abriu)
      let fallbackTimer = null;
      let openedApp = false;

      function cleanup() {
        document.removeEventListener("visibilitychange", onVisibilityChange);
        window.removeEventListener("blur", onBlur);
        window.removeEventListener("pagehide", onPageHide);
      }

      function cancelFallback() {
        openedApp = true;
        if (fallbackTimer) clearTimeout(fallbackTimer);
        cleanup();
      }

      function onVisibilityChange() { if (document.hidden) cancelFallback(); }
      function onBlur() { cancelFallback(); }
      function onPageHide() { cancelFallback(); }

      document.addEventListener("visibilitychange", onVisibilityChange);
      window.addEventListener("blur", onBlur);
      window.addEventListener("pagehide", onPageHide);

      window.location.href = appUrl;

      fallbackTimer = setTimeout(function () {
        if (!openedApp) {
          cleanup();
          window.location.href = mobileWebUrl;
        }
      }, 1300);
    });
  })();
</script>
  </body>
</html>
